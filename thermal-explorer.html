<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thermal Material Selector — NASA TPSX Database</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#0d1117;
    --panel:#141c26;
    --panel-2:#1b2733;
    --grid:#26313d;
    --text:#e7edf3;
    --text-dim:#8ea0b3;
    --accent:#ffb020;
    --accent-dim:#8a6420;
    --cyan:#5fd4d4;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  #app{display:flex;flex-direction:column;height:100vh;min-height:640px;}

  header{
    padding:14px 20px 10px 20px;
    border-bottom:1px solid var(--grid);
    display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;
  }
  header .title{
    font-family:'IBM Plex Mono',monospace;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--text);
  }
  header .title span{color:var(--accent);}
  header .subtitle{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.03em;
  }

  #main{
    flex:1;
    display:flex;
    min-height:0;
  }

  #chart-col{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
    padding:10px 8px 8px 8px;
  }

  #controls{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    padding:6px 12px 10px 12px;
  }
  #search{
    background:var(--panel-2);
    border:1px solid var(--grid);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    padding:7px 10px;
    border-radius:3px;
    width:280px;
    outline:none;
  }
  #search:focus{border-color:var(--accent);}
  #search::placeholder{color:var(--text-dim);font-size:11px;}

  .zoom-controls{display:flex;gap:4px;align-items:center;}
  .zoom-btn{
    background:var(--panel-2);
    border:1px solid var(--grid);
    color:var(--text-dim);
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding:6px 10px;
    border-radius:3px;
    cursor:pointer;
    user-select:none;
    transition:all .12s;
  }
  .zoom-btn:hover{border-color:var(--text-dim);color:var(--text);}
  .zoom-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
  .zoom-hint{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    color:#4d5c6b;
  }

  .legend{display:flex;gap:6px;flex-wrap:wrap;}
  .legend-item{
    display:flex;align-items:center;gap:5px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--text-dim);
    background:var(--panel-2);
    border:1px solid var(--grid);
    border-radius:20px;
    padding:4px 9px 4px 6px;
    cursor:pointer;
    user-select:none;
    transition:opacity .15s;
  }
  .legend-item.off{opacity:0.35;}
  .legend-swatch{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .legend-count{color:#5a6b7d;}

  #chart-wrap{flex:1;min-height:0;position:relative;}
  svg{width:100%;height:100%;display:block;}

  .axis text{fill:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;}
  .axis path,.axis line{stroke:var(--grid);}
  .axis-label{fill:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;}
  .gridline{stroke:var(--grid);stroke-dasharray:2,3;opacity:0.6;}

  .dot{cursor:pointer;stroke:#0d1117;stroke-width:0.6px;transition:r .1s, opacity .15s;}
  .dot:hover{stroke:var(--text);stroke-width:1.2px;}
  .dot.dimmed{opacity:0.08;}
  .dot.selected{stroke:var(--accent);stroke-width:2px;}

  .brush .selection{
    fill:var(--accent) !important;
    fill-opacity:0.12 !important;
    stroke:var(--accent) !important;
    stroke-width:1.2px !important;
    stroke-dasharray:3,2;
  }
  .brush .overlay{cursor:crosshair !important;}

  #tooltip{
    position:absolute;
    pointer-events:none;
    background:#050a10;
    border:1px solid var(--accent-dim);
    color:var(--text);
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    padding:6px 9px;
    border-radius:3px;
    display:none;
    z-index:20;
    max-width:240px;
    line-height:1.5;
  }
  #tooltip .t-name{color:var(--accent);font-weight:600;}
  #tooltip .t-cat{color:var(--text-dim);font-size:10px;}

  #panel{
    width:340px;
    flex-shrink:0;
    background:var(--panel);
    border-left:1px solid var(--grid);
    overflow-y:auto;
    padding:0;
  }
  #panel-empty{
    padding:40px 24px;
    color:var(--text-dim);
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    line-height:1.7;
    text-align:center;
  }
  #panel-empty .big{font-size:28px;display:block;margin-bottom:10px;color:var(--grid);}

  #panel-content{display:none;}
  .panel-head{
    padding:18px 20px 14px 20px;
    border-bottom:1px solid var(--grid);
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
  }
  .panel-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:6px;
  }
  .panel-name{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:16px;
    line-height:1.35;
    color:var(--text);
    margin-bottom:6px;
  }
  .panel-cat{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
  }
  .panel-comp{
    margin-top:10px;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--text-dim);
    line-height:1.5;
    border-top:1px dashed var(--grid);
    padding-top:10px;
  }

  .panel-section-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:10px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#5a6b7d;
    padding:14px 20px 6px 20px;
  }

  .prop-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:7px 20px;
    border-bottom:1px solid #1a232d;
    gap:10px;
  }
  .prop-row.core{background:rgba(255,176,32,0.06);}
  .prop-name{
    font-size:12px;
    color:var(--text);
    line-height:1.4;
  }
  .prop-val{
    font-family:'IBM Plex Mono',monospace;
    font-size:12px;
    color:var(--cyan);
    white-space:nowrap;
    text-align:right;
  }
  .prop-val .unit{color:var(--text-dim);font-size:10px;margin-left:3px;}

  #count-badge{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    margin-left:auto;
  }
  #count-badge b{color:var(--accent);}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--grid);border-radius:4px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="title">Thermal Material <span>Selector</span></div>
      <div class="subtitle">NASA TPSX Database &mdash; Density vs. Thermal Conductivity</div>
    </div>
  </header>
  <div id="controls">
    <input id="search" type="text" placeholder="search material or composition">
    <div class="zoom-controls">
      <div class="zoom-btn active" id="btn-box">Box Zoom</div>
      <div class="zoom-btn" id="btn-reset">Reset View</div>
    </div>
    <div class="legend" id="legend"></div>
    <div id="count-badge"></div>
  </div>
  <div style="padding:0 12px 4px 12px;">
    <span class="zoom-hint" id="zoom-hint">Drag a box on the chart to zoom into that region.</span>
  </div>
  <div id="main">
    <div id="chart-col">
      <div id="chart-wrap">
        <svg id="chart"></svg>
        <div id="tooltip"></div>
      </div>
    </div>
    <div id="panel">
      <div id="panel-empty">
        <span class="big">&#9673;</span>
        Click a point on the chart<br>to view full material properties.
      </div>
      <div id="panel-content"></div>
    </div>
  </div>
</div>

const materials = DATA.materials;
const groups = DATA.groups;

const palette = {
  'Metals':'#5fd4d4', 'Other':'#8ea0b3', 'Elements':'#ffb020', 'Brick':'#e8734a',
  'Plastics':'#a78bfa', 'Glass and Quartz':'#7ee787', 'Earth and Stone':'#c9a15a',
  'Carbon-Phenolics':'#ff6b6b', 'Silica-Silicones':'#4fa3ff', 'Gases':'#f4c95d',
  'Liquids':'#5da9e8', 'default':'#8ea0b3'
};
function colorOf(g){ return palette[g] || palette.default; }

let activeGroups = new Set(groups);
let searchTerm = '';
let selectedId = null;
let boxMode = true; // pan removed - box-zoom is the only interaction mode now

// full-extent domains, computed once, used for Reset View
const fullXDomain = d3.scaleLog().domain(d3.extent(materials, d=>d.d)).nice().domain();
const fullYDomain = d3.scaleLog().domain(d3.extent(materials, d=>d.t)).nice().domain();
// current view domains (mutated by pan/zoom/box-zoom)
let xDomain = [...fullXDomain];
let yDomain = [...fullYDomain];

const MIN_SPAN_LOG = 0.08; // prevents zooming in past this width in log10 units

// ---------- legend ----------
const legendEl = document.getElementById('legend');
groups.forEach(g=>{
  const n = materials.filter(m=>m.g===g).length;
  const item = document.createElement('div');
  item.className='legend-item';
  item.dataset.g = g;
  item.innerHTML = `<span class="legend-swatch" style="background:${colorOf(g)}"></span>${g} <span class="legend-count">${n}</span>`;
  item.addEventListener('click', ()=>{
    if(activeGroups.has(g)){ activeGroups.delete(g); item.classList.add('off'); }
    else { activeGroups.add(g); item.classList.remove('off'); }
    render();
  });
  legendEl.appendChild(item);
});

document.getElementById('search').addEventListener('input', (e)=>{
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

// ---------- chart setup ----------
const svg = d3.select('#chart');
const tooltip = document.getElementById('tooltip');
const chartWrap = document.getElementById('chart-wrap');

let width, height;
const margin = {top:16, right:24, bottom:46, left:60};

function filteredMaterials(){
  return materials.filter(m=>{
    if(!activeGroups.has(m.g)) return false;
    if(searchTerm){
      const hay = (m.n+' '+m.c+' '+(m.comp||'')).toLowerCase();
      if(!hay.includes(searchTerm)) return false;
    }
    return true;
  });
}

let currentX, currentY, innerW, innerH;

function clampDomains(){
  // never let the view exceed the full data extent
  if(xDomain[0] < fullXDomain[0]) xDomain[0] = fullXDomain[0];
  if(xDomain[1] > fullXDomain[1]) xDomain[1] = fullXDomain[1];
  if(yDomain[0] < fullYDomain[0]) yDomain[0] = fullYDomain[0];
  if(yDomain[1] > fullYDomain[1]) yDomain[1] = fullYDomain[1];
  // enforce a minimum zoomed-in span so you can't zoom into nothing
  const xLogSpan = Math.log10(xDomain[1]/xDomain[0]);
  if(xLogSpan < MIN_SPAN_LOG){
    const mid = Math.sqrt(xDomain[0]*xDomain[1]);
    xDomain = [mid/Math.pow(10, MIN_SPAN_LOG/2), mid*Math.pow(10, MIN_SPAN_LOG/2)];
  }
  const yLogSpan = Math.log10(yDomain[1]/yDomain[0]);
  if(yLogSpan < MIN_SPAN_LOG){
    const mid = Math.sqrt(yDomain[0]*yDomain[1]);
    yDomain = [mid/Math.pow(10, MIN_SPAN_LOG/2), mid*Math.pow(10, MIN_SPAN_LOG/2)];
  }
}

function render(){
  const rect = chartWrap.getBoundingClientRect();
  width = rect.width;
  height = rect.height;
  svg.attr('viewBox', `0 0 ${width} ${height}`);
  svg.selectAll('*').remove();

  innerW = width - margin.left - margin.right;
  innerH = height - margin.top - margin.bottom;

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleLog().domain(xDomain).range([0, innerW]);
  const y = d3.scaleLog().domain(yDomain).range([innerH, 0]);
  currentX = x; currentY = y;

  // gridlines
  g.append('g').selectAll('line').data(x.ticks(8)).enter().append('line')
    .attr('class','gridline')
    .attr('x1',d=>x(d)).attr('x2',d=>x(d)).attr('y1',0).attr('y2',innerH);
  g.append('g').selectAll('line').data(y.ticks(8)).enter().append('line')
    .attr('class','gridline')
    .attr('x1',0).attr('x2',innerW).attr('y1',d=>y(d)).attr('y2',d=>y(d));

  // plain, unambiguous tick labels (avoids SI-prefix "10m"/"1k" style ambiguity)
  const tickFmt = (d) => d >= 1 ? d3.format(',')(d) : d.toString();

  // axes
  g.append('g').attr('class','axis')
    .attr('transform', `translate(0,${innerH})`)
    .call(d3.axisBottom(x).ticks(6).tickFormat(tickFmt));
  g.append('g').attr('class','axis')
    .call(d3.axisLeft(y).ticks(6).tickFormat(tickFmt));

  svg.append('text').attr('class','axis-label')
    .attr('x', margin.left + innerW/2).attr('y', height - 8).attr('text-anchor','middle')
    .text('Density (kg/m\u00B3) \u2192 log scale');
  svg.append('text').attr('class','axis-label')
    .attr('transform', `translate(14,${margin.top + innerH/2}) rotate(-90)`)
    .attr('text-anchor','middle')
    .text('Thermal Conductivity (W/m\u00B7K) \u2192 log scale');

  const shown = filteredMaterials();
  const shownIds = new Set(shown.map(m=>m.id));

  document.getElementById('count-badge').innerHTML =
    `<b>${shown.length}</b> / ${materials.length} materials`;

  // ---------- box-zoom brush (placed BEHIND dots so dots stay clickable) ----------
  const brush = d3.brush()
    .extent([[0,0],[innerW,innerH]])
    .on('end', (event)=>{
      if(!event.selection) return;
      const [[sx0, sy0],[sx1, sy1]] = event.selection;
      if(sx1-sx0 < 4 || sy1-sy0 < 4) return; // ignore accidental tiny clicks
      xDomain = [x.invert(sx0), x.invert(sx1)];
      yDomain = [y.invert(sy1), y.invert(sy0)]; // y is inverted range
      clampDomains();
      render();
    });
  g.append('g').attr('class','brush').call(brush);

  // clip so dots don't render outside the plot area while zoomed
  const clipId = 'plot-clip';
  svg.append('clipPath').attr('id', clipId).append('rect')
    .attr('width', innerW).attr('height', innerH);

  const dotsG = g.append('g').attr('clip-path', `url(#${clipId})`);

  dotsG.selectAll('circle')
    .data(materials, d=>d.id)
    .enter().append('circle')
    .attr('class', d=> 'dot' + (shownIds.has(d.id) ? '' : ' dimmed') + (d.id===selectedId ? ' selected':''))
    .attr('cx', d=>x(d.d))
    .attr('cy', d=>y(d.t))
    .attr('r', d=> d.id===selectedId ? 6 : 3.4)
    .attr('fill', d=>colorOf(d.g))
    .attr('fill-opacity', 0.85)
    .on('mousemove', (event,d)=>{
      const [mx,my] = d3.pointer(event, chartWrap);
      tooltip.style.display='block';
      tooltip.style.left = Math.min(mx+14, width-250)+'px';
      tooltip.style.top = Math.max(my-10,0)+'px';
      tooltip.innerHTML = `<div class="t-name">${d.n}</div><div class="t-cat">${d.c}</div>Density: ${d.d} kg/m\u00B3<br>k: ${d.t} W/m\u00B7K`;
    })
    .on('mouseleave', ()=>{ tooltip.style.display='none'; })
    .on('mousedown', (event)=>{ event.stopPropagation(); }) // prevent starting a brush when clicking a dot
    .on('click', (event,d)=>{ event.stopPropagation(); selectedId = d.id; showPanel(d); render(); });
}

// ---------- zoom control buttons ----------
document.getElementById('btn-reset').addEventListener('click', ()=>{
  xDomain = [...fullXDomain];
  yDomain = [...fullYDomain];
  render();
});

function fmtNum(v){
  if(Math.abs(v) >= 1000 || (Math.abs(v) < 0.001 && v !== 0)){
    return v.toExponential(3);
  }
  return String(Math.round(v*10000)/10000);
}

function showPanel(m){
  document.getElementById('panel-empty').style.display='none';
  const c = document.getElementById('panel-content');
  c.style.display='block';

  let propsHtml = m.props.map(p=>`
    <div class="prop-row">
      <div class="prop-name">${p.p}</div>
      <div class="prop-val">${fmtNum(p.v)}${p.u && p.u!=='-' ? `<span class="unit">${p.u}</span>` : ''}</div>
    </div>`).join('');

  if(!m.props.length){
    propsHtml = `<div class="prop-row"><div class="prop-name" style="color:var(--text-dim)">No additional properties recorded for this material.</div></div>`;
  }

  c.innerHTML = `
    <div class="panel-head">
      <div class="panel-eyebrow" style="color:${colorOf(m.g)}">${m.g}</div>
      <div class="panel-name">${m.n}</div>
      <div class="panel-cat">${m.c}</div>
      ${m.comp ? `<div class="panel-comp">${m.comp}</div>` : ''}
    </div>
    <div class="panel-section-label">Chart axes</div>
    <div class="prop-row core"><div class="prop-name">Density</div><div class="prop-val">${fmtNum(m.d)}<span class="unit">kg/m\u00B3</span></div></div>
    <div class="prop-row core"><div class="prop-name">Thermal Conductivity (Isotropic)</div><div class="prop-val">${fmtNum(m.t)}<span class="unit">W/m\u00B7K</span></div></div>
    <div class="panel-section-label">Additional properties (${m.props.length})</div>
    ${propsHtml}
  `;
}

render();
window.addEventListener('resize', render);
</script>
</body>
</html>
